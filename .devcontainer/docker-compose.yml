---
# Python 3
services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    hostname: nyu
    container_name: lab-kubernetes
    volumes:
      - ..:/app
    command: sleep infinity
    environment:
      FLASK_APP: wsgi:app
      FLASK_DEBUG: "True"
      PORT: "8080"
      GUNICORN_BIND: "0.0.0.0:8080"
